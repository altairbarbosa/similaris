name: Build and publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable Windows executable
        shell: cmd
        run: build_windows.bat

      - name: Name Windows release asset
        shell: pwsh
        run: Move-Item dist/Similaris.exe dist/Similaris-Windows-x64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Similaris-Windows-x64
          path: dist/Similaris-Windows-x64.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk python3-venv

      - name: Build portable Linux executable
        run: ./build_linux.sh

      - name: Name Linux release asset
        run: mv dist/Similaris dist/Similaris-Linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Similaris-Linux-x64
          path: dist/Similaris-Linux-x64
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
